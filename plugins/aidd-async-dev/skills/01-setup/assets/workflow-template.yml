name: aidd-async

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  group: aidd-async-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write
  id-token: write

jobs:
  dispatch:
    if: |
      github.event.sender.type != 'Bot' && (
        (github.event_name == 'issues' && (github.event.label.name == '__TO_IMPLEMENT_LABEL__' || github.event.label.name == '__TO_REVIEW_LABEL__')) ||
        (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '__MENTION_IMPLEMENT__') || contains(github.event.comment.body, '__MENTION_REVIEW__')))
      )
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.route.outputs.mode }}
      ref: ${{ steps.route.outputs.ref }}
      issue_number: ${{ steps.route.outputs.issue_number }}
    steps:
      - name: Route to run vs review based on linked PR
        id: route
        run: |
          NUM="${{ github.event.issue.number }}"
          IS_PR="${{ github.event.issue.pull_request != null }}"
          if [ "$IS_PR" = "true" ]; then
            # Event was posted on a PR directly; review that PR.
            REF=$(gh pr view "$NUM" --repo "$GITHUB_REPOSITORY" --json headRefName --jq .headRefName)
            {
              echo "mode=review"
              echo "ref=$REF"
              echo "issue_number=$NUM"
            } >> "$GITHUB_OUTPUT"
          else
            # Event was posted on an issue; check if any open PR closes that issue.
            PR_NUM=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,body \
              --jq "[.[] | select(.body | test(\"(?i)\\\\b(Closes|Fixes|Resolves)\\\\s+#${NUM}\\\\b\"))][0].number" || echo "")
            if [ -n "$PR_NUM" ] && [ "$PR_NUM" != "null" ]; then
              REF=$(gh pr view "$PR_NUM" --repo "$GITHUB_REPOSITORY" --json headRefName --jq .headRefName)
              {
                echo "mode=review"
                echo "ref=$REF"
                echo "issue_number=$PR_NUM"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "mode=run"
                echo "ref=__DEFAULT_BRANCH__"
                echo "issue_number=$NUM"
              } >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run:
    needs: dispatch
    if: needs.dispatch.outputs.mode == 'run'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.dispatch.outputs.ref }}
          fetch-depth: 0

      - name: Run aidd-async-dev pipeline
        uses: anthropics/claude-code-action@v1
        with:
          prompt: "Use skill aidd-async-dev:02:run on issue #${{ needs.dispatch.outputs.issue_number }}"
          __CLAUDE_AUTH_LINE__
          plugins: |
            aidd-async-dev@aidd-framework
            aidd-dev@aidd-framework
          plugin_marketplaces: |
            https://x-access-token:${{ secrets.__MARKETPLACE_TOKEN_NAME__ }}@github.com/__MARKETPLACE_REPO__.git
          claude_args: --permission-mode bypassPermissions
          show_full_output: true

  review:
    needs: dispatch
    if: needs.dispatch.outputs.mode == 'review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.dispatch.outputs.ref }}
          fetch-depth: 0

      - name: Run aidd-async-dev review loop
        uses: anthropics/claude-code-action@v1
        with:
          prompt: "Use skill aidd-async-dev:03:review on PR #${{ needs.dispatch.outputs.issue_number }}"
          __CLAUDE_AUTH_LINE__
          plugins: |
            aidd-async-dev@aidd-framework
            aidd-dev@aidd-framework
          plugin_marketplaces: |
            https://x-access-token:${{ secrets.__MARKETPLACE_TOKEN_NAME__ }}@github.com/__MARKETPLACE_REPO__.git
          claude_args: --permission-mode bypassPermissions
          show_full_output: true
