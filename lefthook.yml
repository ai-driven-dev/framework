pre-commit:
  output: true
  commands:
    json-validity:
      glob: "**/*.json"
      run: |
        if ! command -v node >/dev/null 2>&1; then
          echo "❌ node not available; cannot validate JSON"
          exit 1
        fi
        node scripts/validate-json.mjs {files}
    yaml-validity:
      glob: "**/*.{yml,yaml}"
      exclude:
        - "plugins/*/skills/*/assets/**"
      run: |
        if ! command -v node >/dev/null 2>&1; then
          echo "❌ node not available; cannot validate YAML"
          exit 1
        fi
        node scripts/validate-yaml.mjs {files}
    skill-frontmatter:
      glob: "plugins/*/skills/*/SKILL.md"
      run: |
        for f in {files}; do
          [ -f "$f" ] || continue
          if ! head -10 "$f" | grep -q "^name:"; then
            echo "❌ missing 'name:' frontmatter: $f"
            exit 1
          fi
          if ! head -10 "$f" | grep -q "^description:"; then
            echo "❌ missing 'description:' frontmatter: $f"
            exit 1
          fi
        done
    sync-skill-argument-hints:
      glob: "plugins/*/skills/**"
      run: |
        if ! command -v node >/dev/null 2>&1; then
          echo "ℹ️  node not available; skipping sync-skill-argument-hints"
          exit 0
        fi
        node scripts/sync-skill-argument-hints.mjs >/dev/null
        git add plugins/*/skills/*/SKILL.md 2>/dev/null || true
    markdown-links:
      glob: "**/*.md"
      run: |
        if ! command -v node >/dev/null 2>&1; then
          echo "ℹ️  node not available; skipping markdown-links"
          exit 0
        fi
        # TEMPORARY (aidd-cli -> framework migration, phase 1): cli's own
        # historical archives were never link-checked before landing here —
        # 704 pre-existing, unrelated broken "links" (test fixtures with
        # intentionally fake paths, old task docs using @src/foo.ts as an
        # agent-mention shorthand, not a markdown link). See the migration
        # plan's final phase for the follow-up that fixes the real links and
        # removes these two --ignore flags.
        node scripts/check-markdown-links.js --ignore cli/tests/fixtures --ignore cli/aidd_docs/tasks
    summarize-plugin-catalogs:
      run: |
        [ -d plugins ] || exit 0
        if ! command -v node >/dev/null 2>&1; then
          echo "ℹ️  node not available; skipping summarize-plugin-catalogs"
          exit 0
        fi
        for plugin in plugins/*/; do
          name=$(basename "$plugin")
          node scripts/summarize-markdown.js "$plugin" "${plugin}CATALOG.md" \
            --depth=4 \
            --fields=description \
            --title="$name catalog" \
            --tagline="Auto-generated index of skills, agents, references and assets shipped by the \`$name\` plugin." \
            >/dev/null
          git add "${plugin}CATALOG.md" 2>/dev/null || true
        done
    sync-readme-counts:
      run: |
        if ! command -v node >/dev/null 2>&1; then
          echo "ℹ️  node not available; skipping sync-readme-counts"
          exit 0
        fi
        node scripts/sync-readme-counts.mjs >/dev/null
        git add README.md 2>/dev/null || true
    cli-biome:
      glob: "cli/**"
      run: cd cli && pnpm lint
    cli-typecheck:
      glob: "cli/**"
      run: cd cli && pnpm typecheck

pre-push:
  commands:
    cli-knip:
      glob: "cli/**"
      run: cd cli && pnpm knip:production
    cli-test:
      glob: "cli/**"
      run: cd cli && pnpm test

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
