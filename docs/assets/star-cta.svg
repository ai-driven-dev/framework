<svg xmlns="http://www.w3.org/2000/svg" width="560" height="150" viewBox="0 0 560 150" fill="none" role="img" aria-label="Enjoying AIDD? Give it a star — the button is at the top-right of this page">
  <style>
    .h { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #D97757; }
    .s { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #8b949e; }
  </style>

  <text x="22" y="62" class="h">Enjoying AIDD?</text>
  <text x="22" y="96" class="h">Give it a star</text>
  <text x="22" y="122" class="s">it's the button at the top-right of this page</text>

  <!-- hand-drawn curve sweeping up toward the star -->
