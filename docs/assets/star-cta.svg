  <!-- target star (top-right) -->
  <path d="M525 12 L528.6 23.06 L540.2 23.06 L530.8 29.89 L534.4 40.94 L525 34.11 L515.6 40.94 L519.2 29.89 L509.8 23.06 L521.4 23.06 Z" fill="#F5A623" stroke="#D97757" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
