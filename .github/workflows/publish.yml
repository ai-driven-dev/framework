name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v2.4.1)"
        required: true

permissions:
  contents: read
  packages: write
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ai-driven-dev"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Publish to GitHub Packages (continue on error in case version already exists)
      - run: pnpm publish --no-git-checks
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Reconfigure Node for npm registry (setup-node rewrites .npmrc auth)
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # Publish to npm (granular access token, --provenance adds SLSA attestation)
      - run: pnpm publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
