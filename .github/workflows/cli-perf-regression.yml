name: cli Performance Regression

# Moved from cli/.github/workflows/perf-regression.yml during the aidd-cli ->
# framework migration: GitHub Actions only discovers workflows under the repo
# root .github/workflows/, not a subdirectory's — left in place under cli/ it
# would silently never run. Scoped to cli/** only (no plugins/.claude-plugin
# dependency here — the benchmark scripts touch neither).

on:
  pull_request:
    paths:
      - "cli/**"
  push:
    branches: [main]
    paths:
      - "cli/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  perf:
    name: Perf benchmark & regression check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: cd cli && pnpm install --frozen-lockfile
      - run: cd cli && pnpm build
      - name: Run benchmark
        run: cd cli && pnpm bench
      - name: Check regression vs baseline
        run: cd cli && pnpm bench:check
