name: CI & Publish

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish manually (e.g. v2.13.3)"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write # required for OIDC trusted publishing

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' &&
      !startsWith(github.head_ref, 'release-please--') &&
      !contains(github.event.head_commit.message, 'release-please--branches--')
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
          commitDepth: 30

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [commitlint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [commitlint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [commitlint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build & Bundle Budget
    runs-on: ubuntu-latest
    needs: [commitlint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  knip:
    name: Knip (dead code)
    runs-on: ubuntu-latest
    needs: [commitlint]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip:production

  jscpd:
    name: JSCPD (duplication)
    runs-on: ubuntu-latest
    needs: [commitlint]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm jscpd

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, build, knip, jscpd]
    if: |
      always() &&
      github.event_name == 'push' &&
      (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.knip.result == 'success' || needs.knip.result == 'skipped') &&
      (needs.jscpd.result == 'success' || needs.jscpd.result == 'skipped')
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [release-please]
    if: |
      always() && (
        (needs.release-please.result == 'success' && needs.release-please.outputs.release_created == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.tag != '')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Publish to GitHub Packages
      - name: Publish to GitHub Packages
        continue-on-error: true
        run: |
          printf "@ai-driven-dev:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}\n" > .npmrc
          pnpm publish --no-git-checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Publish to npm via OIDC trusted publishing
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        run: |
          rm -f .npmrc
          printf "# @ai-driven-dev/cli\n\nAI-Driven Development CLI — distribute the AIDD framework across AI coding assistants.\n\n\`\`\`bash\nnpm install -g @ai-driven-dev/cli\n\`\`\`\n" > README.md
          pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
