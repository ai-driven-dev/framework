name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release-please--')"
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
          commitDepth: 1

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [commitlint]
    if: |
      always() &&
      github.event_name == 'push' &&
      (needs.commitlint.result == 'success' || needs.commitlint.result == 'skipped')
    outputs:
      root_release_created: ${{ steps.release.outputs['.--release_created'] }}
      root_tag_name: ${{ steps.release.outputs['.--tag_name'] }}
      root_version: ${{ steps.release.outputs['.--version'] }}
      context_release_created: ${{ steps.release.outputs['plugins/aidd-context--release_created'] }}
      context_tag_name: ${{ steps.release.outputs['plugins/aidd-context--tag_name'] }}
      context_version: ${{ steps.release.outputs['plugins/aidd-context--version'] }}
      dev_release_created: ${{ steps.release.outputs['plugins/aidd-dev--release_created'] }}
      dev_tag_name: ${{ steps.release.outputs['plugins/aidd-dev--tag_name'] }}
      dev_version: ${{ steps.release.outputs['plugins/aidd-dev--version'] }}
      vcs_release_created: ${{ steps.release.outputs['plugins/aidd-vcs--release_created'] }}
      vcs_tag_name: ${{ steps.release.outputs['plugins/aidd-vcs--tag_name'] }}
      vcs_version: ${{ steps.release.outputs['plugins/aidd-vcs--version'] }}
      pm_release_created: ${{ steps.release.outputs['plugins/aidd-pm--release_created'] }}
      pm_tag_name: ${{ steps.release.outputs['plugins/aidd-pm--tag_name'] }}
      pm_version: ${{ steps.release.outputs['plugins/aidd-pm--version'] }}
      orchestrator_release_created: ${{ steps.release.outputs['plugins/aidd-orchestrator--release_created'] }}
      orchestrator_tag_name: ${{ steps.release.outputs['plugins/aidd-orchestrator--tag_name'] }}
      orchestrator_version: ${{ steps.release.outputs['plugins/aidd-orchestrator--version'] }}
      refine_release_created: ${{ steps.release.outputs['plugins/aidd-refine--release_created'] }}
      refine_tag_name: ${{ steps.release.outputs['plugins/aidd-refine--tag_name'] }}
      refine_version: ${{ steps.release.outputs['plugins/aidd-refine--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-attach-root:
    name: Build and attach (root)
    needs: [release-please]
    if: needs.release-please.outputs.root_release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            npm-global-${{ runner.os }}-

      - name: Install CLI
        # Use @beta during pre-release cycle; switch to @latest after stable v5 ships.
        run: |
          npm config set @ai-driven-dev:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.PACKAGES_TOKEN }}
          npm install -g @ai-driven-dev/cli@beta

      - name: Build distributions
        run: bash scripts/build-dist.sh

      - name: Build source tarball
        run: |
          VERSION="${{ needs.release-please.outputs.root_version }}"
          tar czf "/tmp/aidd-framework-${VERSION}.tar.gz" \
            plugins/ \
            .claude-plugin/ \
            aidd_docs/

      - name: Build per-tool tarballs
        run: |
          VERSION="${{ needs.release-please.outputs.root_version }}"
          for tool in claude cursor copilot codex; do
            tar czf "/tmp/aidd-${tool}-${VERSION}.tar.gz" \
              -C dist/${tool}-local \
              --exclude='.aidd/cache' \
              .
            tar czf "/tmp/aidd-${tool}-remote-${VERSION}.tar.gz" \
              -C dist/${tool}-remote \
              --exclude='.aidd/cache' \
              .
          done

      - name: Attach tarballs to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.release-please.outputs.root_version }}"
          TAG="${{ needs.release-please.outputs.root_tag_name }}"
          gh release upload "${TAG}" \
            "/tmp/aidd-framework-${VERSION}.tar.gz" \
            "/tmp/aidd-claude-${VERSION}.tar.gz" \
            "/tmp/aidd-claude-remote-${VERSION}.tar.gz" \
            "/tmp/aidd-cursor-${VERSION}.tar.gz" \
            "/tmp/aidd-cursor-remote-${VERSION}.tar.gz" \
            "/tmp/aidd-copilot-${VERSION}.tar.gz" \
            "/tmp/aidd-copilot-remote-${VERSION}.tar.gz" \
            "/tmp/aidd-codex-${VERSION}.tar.gz" \
            "/tmp/aidd-codex-remote-${VERSION}.tar.gz" \
            --clobber

  build-and-attach-plugin:
    name: Build and attach (${{ matrix.plugin }})
    needs: [release-please]
    if: |
      needs.release-please.outputs.context_release_created == 'true' ||
      needs.release-please.outputs.dev_release_created == 'true' ||
      needs.release-please.outputs.vcs_release_created == 'true' ||
      needs.release-please.outputs.pm_release_created == 'true' ||
      needs.release-please.outputs.orchestrator_release_created == 'true' ||
      needs.release-please.outputs.refine_release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - plugin: aidd-context
            release_created: ${{ needs.release-please.outputs.context_release_created }}
            tag_name: ${{ needs.release-please.outputs.context_tag_name }}
            version: ${{ needs.release-please.outputs.context_version }}
          - plugin: aidd-dev
            release_created: ${{ needs.release-please.outputs.dev_release_created }}
            tag_name: ${{ needs.release-please.outputs.dev_tag_name }}
            version: ${{ needs.release-please.outputs.dev_version }}
          - plugin: aidd-vcs
            release_created: ${{ needs.release-please.outputs.vcs_release_created }}
            tag_name: ${{ needs.release-please.outputs.vcs_tag_name }}
            version: ${{ needs.release-please.outputs.vcs_version }}
          - plugin: aidd-pm
            release_created: ${{ needs.release-please.outputs.pm_release_created }}
            tag_name: ${{ needs.release-please.outputs.pm_tag_name }}
            version: ${{ needs.release-please.outputs.pm_version }}
          - plugin: aidd-orchestrator
            release_created: ${{ needs.release-please.outputs.orchestrator_release_created }}
            tag_name: ${{ needs.release-please.outputs.orchestrator_tag_name }}
            version: ${{ needs.release-please.outputs.orchestrator_version }}
          - plugin: aidd-refine
            release_created: ${{ needs.release-please.outputs.refine_release_created }}
            tag_name: ${{ needs.release-please.outputs.refine_tag_name }}
            version: ${{ needs.release-please.outputs.refine_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin tarball
        if: matrix.release_created == 'true'
        run: |
          PLUGIN="${{ matrix.plugin }}"
          VERSION="${{ matrix.version }}"
          tar czf "/tmp/${PLUGIN}-v${VERSION}.tar.gz" \
            -C "plugins/${PLUGIN}" \
            --exclude='.aidd/cache' \
            .

      - name: Attach tarball to release
        if: matrix.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PLUGIN="${{ matrix.plugin }}"
          VERSION="${{ matrix.version }}"
          TAG="${{ matrix.tag_name }}"
          gh release upload "${TAG}" \
            "/tmp/${PLUGIN}-v${VERSION}.tar.gz" \
            --clobber
