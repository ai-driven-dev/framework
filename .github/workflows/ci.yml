name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release-please--')"
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
          commitDepth: 1

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [commitlint]
    if: |
      always() &&
      github.event_name == 'push' &&
      (needs.commitlint.result == 'success' || needs.commitlint.result == 'skipped')
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      root_released: ${{ steps.release.outputs.release_created }}
      root_tag_name: ${{ steps.release.outputs.tag_name }}
      root_version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-framework:
    name: Build framework release artifacts
    needs: [release-please]
    if: needs.release-please.outputs.root_released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            npm-global-${{ runner.os }}-

      - name: Install CLI
        # Use @beta during pre-release cycle; switch to @latest after stable v5 ships.
        run: |
          npm config set @ai-driven-dev:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.PACKAGES_TOKEN }}
          npm install -g @ai-driven-dev/cli@beta

      - name: Build distributions
        run: bash scripts/build-dist.sh

      - name: Build source tarball
        run: |
          VERSION="${{ needs.release-please.outputs.root_version }}"
          tar czf "/tmp/aidd-framework-${VERSION}.tar.gz" \
            plugins/ \
            .claude-plugin/ \
            aidd_docs/

      - name: Build per-tool tarballs
        run: |
          VERSION="${{ needs.release-please.outputs.root_version }}"
          for tool in claude cursor copilot codex; do
            tar czf "/tmp/aidd-${tool}-${VERSION}.tar.gz" \
              -C dist/${tool}-local \
              --exclude='.aidd/cache' \
              .
            tar czf "/tmp/aidd-${tool}-remote-${VERSION}.tar.gz" \
              -C dist/${tool}-remote \
              --exclude='.aidd/cache' \
              .
          done

      - name: Attach tarballs to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.release-please.outputs.root_version }}"
          TAG="${{ needs.release-please.outputs.root_tag_name }}"
          gh release upload "${TAG}" \
            "/tmp/aidd-framework-${VERSION}.tar.gz" \
            "/tmp/aidd-claude-${VERSION}.tar.gz" \
            "/tmp/aidd-claude-remote-${VERSION}.tar.gz" \
            "/tmp/aidd-cursor-${VERSION}.tar.gz" \
            "/tmp/aidd-cursor-remote-${VERSION}.tar.gz" \
            "/tmp/aidd-copilot-${VERSION}.tar.gz" \
            "/tmp/aidd-copilot-remote-${VERSION}.tar.gz" \
            "/tmp/aidd-codex-${VERSION}.tar.gz" \
            "/tmp/aidd-codex-remote-${VERSION}.tar.gz" \
            --clobber

  build-plugins:
    name: Build plugin release artifacts
    needs: [release-please]
    if: |
      needs.release-please.outputs.releases_created == 'true' &&
      contains(needs.release-please.outputs.paths_released, 'plugins/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and attach per-plugin tarballs
        env:
          GH_TOKEN: ${{ github.token }}
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        run: |
          set -euo pipefail
          for path in $(echo "${PATHS_RELEASED}" | jq -r '.[]'); do
            case "${path}" in
              plugins/*)
                name="${path#plugins/}"
                version="$(jq -r '.version' "${path}/.claude-plugin/plugin.json")"
                tag="${name}-v${version}"
                tarball="/tmp/${name}-v${version}.tar.gz"
                tar czf "${tarball}" \
                  -C plugins \
                  --exclude='.aidd/cache' \
                  "${name}"
                gh release upload "${tag}" "${tarball}" --clobber
                ;;
            esac
          done
