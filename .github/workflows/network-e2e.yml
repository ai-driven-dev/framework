name: Network E2E (nightly)

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  network-e2e:
    name: Network E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run network E2E tests
        run: pnpm test:e2e tests/e2e/network.e2e.test.ts
        env:
          RUN_NETWORK_TESTS: "1"
          # Optional: set AIDD_TEST_PAT for private framework repos
          # AIDD_TOKEN: ${{ secrets.AIDD_TEST_PAT }}
