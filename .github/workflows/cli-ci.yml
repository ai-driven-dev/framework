name: cli CI

# Native path-filtered isolation: this whole workflow is skipped when nothing
# under cli/, plugins/, or .claude-plugin/ changed — no third-party paths-filter
# action needed. plugins/ and .claude-plugin/ are included because cli's own
# test fixtures snapshot that content directly (see cli/tests/fixtures/).

on:
  push:
    branches: [main, next]
    paths:
      - "cli/**"
      - "plugins/**"
      - ".claude-plugin/**"
  pull_request:
    paths:
      - "cli/**"
      - "plugins/**"
      - ".claude-plugin/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cli-typecheck:
    name: cli / Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: cd cli && pnpm install --frozen-lockfile
      - run: cd cli && pnpm typecheck

  cli-lint:
    name: cli / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: cd cli && pnpm install --frozen-lockfile
      - run: cd cli && pnpm lint

  cli-test:
    name: cli / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install expect (TTY persona tests)
        run: sudo apt-get update && sudo apt-get install -y expect
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: cd cli && pnpm install --frozen-lockfile
      - run: cd cli && pnpm test

  cli-build:
    name: cli / Build & Bundle Budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: cd cli && pnpm install --frozen-lockfile
      - run: cd cli && pnpm build

  cli-knip:
    name: cli / Knip (dead code)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: cd cli && pnpm install --frozen-lockfile
      - run: cd cli && pnpm knip:production

  cli-jscpd:
    name: cli / JSCPD (duplication)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: cd cli && pnpm install --frozen-lockfile
      - run: cd cli && pnpm jscpd
